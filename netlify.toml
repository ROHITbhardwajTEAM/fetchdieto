[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Cron: fires server-side push notifications every minute ──────────
[[crons]]
  path     = "/api/cron/reminders?secret=fetchdieto-cron-2026"
  schedule = "* * * * *"
